name: ihunt-prod
services:
  api:
    build:
      dockerfile: "./config/Dockerfile"
      context: .
      platforms:
        - linux/amd64
    image: ghcr.io/chaosexanima/ihunt:latest
    restart: unless-stopped
    volumes:
      - ./data/media-prod:/media
    env_file: .env.production
    environment:
      PUBLIC_HOST: https://ihunt-eu.com
      LAN_HOST: https://cologne.ihunt-eu.com
      COOKIE_DOMAIN: .ihunt-eu.com
      UPLOAD_PATH: /media
      MEDIA_PATH: /images

  images:
    image: ghcr.io/imgproxy/imgproxy:latest
    restart: unless-stopped
    volumes:
      - ./data/media-prod:/mnt/images:ro
    env_file: .env.production
    environment:
      PORT: 9000
      IMGPROXY_WORKERS: 20
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: "/mnt/images"
      IMGPROXY_PATH_PREFIX: /images

  static:
    image: nginx
    restart: unless-stopped
    volumes:
      - ./config/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./data/certs/etc:/certs
      - ./dist:/etc/nginx/html:ro
      - nginx_cache:/var/cache/nginx:delegated
    ports:
      - "443:443"

  certbot:
    image: certbot/dns-cloudflare
    restart: no
    volumes:
      - ./data/certs/etc:/etc/letsencrypt
      - ./data/certs/lib:/var/lib/letsencrypt
      - ./data/certs/cloudflare.ini:/cloudflare.ini
    # command: certificates
    command: certonly -n --keep --dns-cloudflare --dns-cloudflare-credentials /cloudflare.ini -d cologne.ihunt-eu.com

volumes:
  nginx_cache:
