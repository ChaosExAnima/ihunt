services:
  images:
    image: ghcr.io/imgproxy/imgproxy:latest
    restart: unless-stopped
    volumes:
      - ./data/imgproxy:/mnt/data
      - ${UPLOAD_PATH}:/mnt/images:ro
    environment:
      PORT: 9000
      IMGPROXY_KEY: "${IMGPROXY_KEY}"
      IMGPROXY_SALT: "${IMGPROXY_SALT}"
      IMGPROXY_WORKERS: 20
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: "/mnt/images"
      IMGPROXY_PATH_PREFIX: /images
    ports:
      - "9000:9000"

  postgres:
    image: postgres
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ihunt
    ports:
      - 5555:5432
